name: Morning IQPlus backfill

on:
  # Scheduled trigger lives in cron-job.org (calls workflow_dispatch via GitHub REST API).
  # Drift on the evening daily-scrape sometimes ran into the next morning, so this
  # backfill has to fire reliably at 08:00 WIB Tue-Sat — GH Actions cron drift made
  # that unreliable. Idempotent: SQL no-op when broksum is already current.
  workflow_dispatch: {}

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill via IQPlus
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrape.py backfill-iqplus

      - name: Upload CSVs to Supabase
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          for f in data/*.csv; do
            [ -e "$f" ] || continue
            DATE=$(basename "$f" .csv)
            python scrape.py upload --date "$DATE"
          done

      - name: Upload CSV artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfilled-csv
          path: data/*.csv
          retention-days: 7
          if-no-files-found: ignore
